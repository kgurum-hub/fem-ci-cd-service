name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22

      - run: npm ci

      - run: npm run build

      # Upgraded to v6 to align with the runner's architecture shifts
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

